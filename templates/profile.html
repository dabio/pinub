{{ define "title" }}Profile{{ end }}

{{ define "body" }}
<div class="pa4">
    <h2 class="f2">Profile</h2>

    {{ if .Error }}
    <div class="dark-red mb3">{{ .Error }}</div>
    {{ end }}

    <form method="post" class="fl w-50 pr3">
        <div>
            <label class="f6 b db mb2" for="email">Email</label>
            <input class="input-reset ba b--black-20 pa2 db w-100 mb3" id="email" name="email" type="email"
                placeholder="email@example.com" value="{{ .User.Email }}" required>
        </div>

        <div>
            <button class="f6 dim ph3 pv2 dib white bg-navy bn" type="submit">Update Email</button>
        </div>
    </form>

    <form method="post" class="fl w-50 pl3">
        <div>
            <label class="f6 b db mb2" for="password">Current Password</label>
            <input class="input-reset ba b--black-20 pa2 db w-100 mb3" id="password" name="password" type="password"
                required>
        </div>

        <div>
            <label class="f6 b db mb2" for="new_password">New Password</label>
            <input class="input-reset ba b--black-20 pa2 db w-100 mb3" id="new_password" name="new_password"
                type="password">
        </div>

        <div>
            <button class="f6 dim ph3 pv2 dib white bg-navy bn" type="submit">Update Password</button>
        </div>
    </form>

</div>
{{ end }}
